<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lärarplattform - Veckoplanering</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a69085">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Planering">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="flex flex-1 overflow-hidden">
    <div class="flex flex-col w-12 bg-[#b0a99f] border-r border-gray-300 z-30">
        <button onclick="changeView('oversikt')" id="btn-oversikt" class="sidebar-btn active">Översikt</button>
        <button onclick="changeView('framtid')" id="btn-framtid" class="sidebar-btn">Framtid</button>
        <button onclick="changeView('mandag')" id="btn-mandag" class="sidebar-btn">Måndag</button>
        <button onclick="changeView('tisdag')" id="btn-tisdag" class="sidebar-btn">Tisdag</button>
        <button onclick="changeView('onsdag')" id="btn-onsdag" class="sidebar-btn">Onsdag</button>
        <button onclick="changeView('torsdag')" id="btn-torsdag" class="sidebar-btn">Torsdag</button>
        <button onclick="changeView('fredag')" id="btn-fredag" class="sidebar-btn">Fredag</button>
    </div>
    <div class="flex-1 flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <button onclick="changeWeek(-1)" class="text-2xl font-bold hover:text-gray-600">&lsaquo;</button>
                <h1 class="text-4xl serif-title">Vecka <span id="current-week-display">--</span></h1>
                <button onclick="changeWeek(1)" class="text-2xl font-bold hover:text-gray-600">&rsaquo;</button>
            </div>
            <div id="digital-clock" class="clock-display tracking-widest">00:00</div>
        </div>
        <div id="view-oversikt" class="grid grid-cols-5 gap-4 h-full overflow-y-auto custom-scrollbar pb-10"></div>
        <div id="view-framtid" class="hidden overflow-y-auto custom-scrollbar pb-10">
            <h2 class="text-xl mb-6 font-bold uppercase tracking-widest text-gray-400">Planera framåt</h2>
            <div class="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4" id="future-weeks-grid"></div>
        </div>
        <div id="view-day-detail" class="hidden flex flex-row gap-8 h-full overflow-hidden">
            <div id="lesson-sidebar" class="w-1/3 flex flex-col overflow-y-auto pr-4 custom-scrollbar">
                <div id="active-tool-container" class="hidden-tool card p-5 mb-6 border-[#a6857e]/20">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
                        <h3 id="tool-title" class="font-bold text-[#a6857e] uppercase text-xs tracking-widest">Verktyg</h3>
                        <button onclick="closeTool()" class="text-gray-400 hover:text-black font-bold text-xl leading-none">&times;</button>
                    </div>
                    <div id="tool-content"></div>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 id="detail-day-name" class="text-4xl font-bold italic serif-title">Måndag</h2>
                        <p id="detail-date" class="text-gray-500 text-sm font-medium"></p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="addLessonPrompt()" class="bg-[#9eb19a] text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md hover:bg-[#8da089] transition-all transform hover:scale-105">+ Ny lektion</button>
                        <button onclick="toggleSidebar()" title="Dölj sidopanel" class="bg-[#c8b49a] text-white px-3 py-2 rounded-lg text-xs font-bold shadow-md hover:bg-[#b8a48a] transition-all transform hover:scale-105">◀ Dölj</button>
                    </div>
                </div>
                <div id="detail-lesson-list" class="space-y-4 pb-20"></div>
            </div>
            <div class="flex-grow w-2/3 card flex flex-col bg-white min-w-0 shadow-xl overflow-hidden">
                <div id="smartboard-content" class="flex-1 overflow-y-auto custom-scrollbar p-10">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 id="sb-subject" class="text-6xl font-bold mb-2 text-[#a6857e] tracking-tight">Välj en lektion</h3>
                            <p id="sb-time" class="text-2xl text-gray-300 italic"></p>
                        </div>
                        <button id="show-sidebar-btn" onclick="toggleSidebar()" title="Visa sidopanel" class="bg-[#c8b49a] text-white px-3 py-2 rounded-lg text-xs font-bold shadow-md hover:bg-[#b8a48a] transition-all transform hover:scale-105">▶ Visa</button>
                    </div>
                    <div id="sb-columns" class="flex gap-6 min-h-[500px]">
                        <div id="sb-plan" class="flex-1 outline-none min-h-[500px] whitespace-pre-wrap pb-32 text-gray-700 relative" contenteditable="true" oninput="handleInput()" onpaste="handlePaste(event)" placeholder="Skriv din planering här..."></div>
                        <div id="sb-plan-divider" class="hidden w-px bg-gray-100 self-stretch flex-shrink-0"></div>
                        <div id="sb-plan-right" class="hidden flex-1 outline-none min-h-[500px] whitespace-pre-wrap pb-32 text-gray-700 relative" contenteditable="true" oninput="handleInputRight()" onpaste="handlePasteRight(event)" placeholder="Höger kolumn..."></div>
                    </div>
                </div>
                <!-- Bottom toolbar -->
                <div class="border-t border-gray-100 bg-[#faf9f8] px-6 py-3 flex items-center gap-3">
                    <!-- Text formatting -->
                    <button onclick="document.execCommand('bold')" title="Fet (Ctrl+B)" id="bold-btn" class="toolbar-btn w-7 h-7 font-bold text-sm">B</button>
                    <button onclick="document.execCommand('italic')" title="Kursiv (Ctrl+I)" id="italic-btn" class="toolbar-btn w-7 h-7 text-sm">/</button>
                    <button onclick="toggleNotesModal()" title="Privata lektionsanteckningar" id="notes-btn" class="toolbar-btn w-7 h-7 text-base">📝</button>
                    <div class="w-px h-5 bg-gray-200 mx-1"></div>
                    <!-- Font size -->
                    <input type="range" min="16" max="80" value="32" title="Textstorlek" class="w-14 size-slider" oninput="updateFontSize(this.value)">
                    <div class="w-px h-5 bg-gray-200 mx-1"></div>
                    <!-- Image -->
                    <button onclick="document.getElementById('image-upload').click()" title="Lägg till bild" class="toolbar-btn w-7 h-7 text-base">🖼</button>
                    <input type="file" id="image-upload" accept="image/*" class="hidden" style="display:none" onchange="insertImageFromFile(this)">
                    <!-- Split -->
                    <button id="split-btn" onclick="toggleSplit()" title="Dela i två kolumner" class="toolbar-btn w-7 h-7 text-xs">⬜⬜</button>
                    <div class="flex-1"></div>
                    <button class="border border-gray-200 hover:bg-gray-50 px-3 py-1.5 rounded-lg text-[10px] font-bold text-gray-400 uppercase tracking-widest transition" onclick="toggleFullscreen()">Helskärm</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="bottom-toolbar" class="h-20 bg-[#f7f6f5] border-t border-gray-300 flex items-center px-8 gap-8 z-40">
    <span class="font-bold text-[10px] uppercase tracking-[0.2em] text-gray-400">Verktygslåda</span>
    <div class="flex gap-4">
        <button onclick="openTool('multiplication')" class="flex items-center gap-3 bg-white border border-gray-200 px-6 py-3 rounded-xl text-sm font-semibold hover:border-[#a6857e] hover:text-[#a6857e] transition-all shadow-sm"><span class="text-lg">×</span> Multiplikation</button>
        <button onclick="openTool('fractions')" class="flex items-center gap-3 bg-white border border-gray-200 px-6 py-3 rounded-xl text-sm font-semibold hover:border-[#a6857e] hover:text-[#a6857e] transition-all shadow-sm"><span class="text-lg">📏</span> Bråkplank</button>
        <button onclick="openTool('timer')" class="flex items-center gap-3 bg-white border border-gray-200 px-6 py-3 rounded-xl text-sm font-semibold hover:border-[#a6857e] hover:text-[#a6857e] transition-all shadow-sm"><span class="text-lg">⏱️</span> Time Timer</button>
        <button onclick="openTool('stopwatch')" class="flex items-center gap-3 bg-white border border-gray-200 px-6 py-3 rounded-xl text-sm font-semibold hover:border-[#a6857e] hover:text-[#a6857e] transition-all shadow-sm"><span class="text-lg">⏱️</span> Stoppur</button>
    </div>

    <div class="flex-1"></div>

    <div class="flex items-center gap-3 text-sm">
        <button onclick="savePlannerAs()" 
                class="flex items-center gap-2 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-5 py-2.5 rounded-2xl text-emerald-700 font-medium transition-all active:scale-95">
            💾 Spara som fil...
        </button>
        <button onclick="openPlannerFile()" 
                class="flex items-center gap-2 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-5 py-2.5 rounded-2xl text-amber-700 font-medium transition-all active:scale-95">
            📂 Öppna fil...
        </button>

        <button onclick="downloadBackup()" 
                class="px-4 py-2 text-xs text-gray-500 hover:text-gray-700 underline font-medium">Ladda ner backup</button>

        <input type="file" id="import-file-input" accept=".json" class="hidden" onchange="importBackup(event)">
        <button onclick="document.getElementById('import-file-input').click()" 
                class="px-4 py-2 text-xs text-gray-500 hover:text-gray-700 underline font-medium">Importera backup</button>

        <div id="file-status" class="ml-3 text-[10px] font-mono text-gray-400 tracking-tight">localStorage (ingen diskfil kopplad)</div>
    </div>
</div>
<button id="toolbar-toggle-btn" 
        onclick="toggleBottomToolbar()"
        class="fixed bottom-6 right-6 w-14 h-14 bg-white rounded-3xl shadow-2xl border border-gray-200 flex items-center justify-center text-3xl z-[100] active:scale-95 transition-all hover:border-[#a6857e]">
    🛠️
</button>

<!-- Private lesson notes modal -->
<div id="lesson-notes-modal" class="notes-modal hidden" onclick="handleNotesModalBackdrop(event)">
    <div class="notes-modal-content" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h3 class="font-bold text-[#a6857e] uppercase text-xs tracking-widest">🔒 Privata lektionsanteckningar</h3>
                <p id="notes-modal-lesson-name" class="text-sm text-gray-500 mt-1"></p>
            </div>
            <button onclick="closeNotesModal()" class="text-gray-400 hover:text-black font-bold text-xl leading-none">&times;</button>
        </div>
        <textarea id="private-notes-textarea" class="private-notes-area custom-scrollbar" placeholder="Skriv privata anteckningar för denna lektion... (syns bara för dig)"></textarea>
        <div class="flex justify-between items-center mt-4">
            <span class="text-[10px] text-gray-400 italic">🔒 Visas bara för läraren – ej i elevvy</span>
            <button onclick="savePrivateNotes(); closeNotesModal();" class="bg-[#a6857e] text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-[#92756e] transition-all">Spara &amp; stäng</button>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
